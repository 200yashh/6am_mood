<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>For You, My Love</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Great+Vibes&family=Jost:wght@200;300;400&display=swap');

/* ── Variables ── */
:root {
  --plum:    #3b0f52;
  --violet:  #7b2d8b;
  --rose:    #c0507a;
  --blush:   #f4a7c0;
  --petal:   #fde8f0;
  --cream:   #fff8fc;
  --glow-r:  rgba(192,80,122,0.40);
  --glow-v:  rgba(123,45,139,0.28);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html {
  height: 100%;
  scroll-behavior: smooth;
}
body {
  min-height: 100%;
  font-family: 'Cormorant Garamond', serif;
  background: #160320;
  overflow-x: hidden;
  position: relative;
}

/* ═══════════════════════════
   ANIMATED BACKGROUND
═══════════════════════════ */
.bg-gradient {
  position: fixed;
  inset: 0;
  z-index: 0;
  background: radial-gradient(ellipse at 20% 20%, #4a1260 0%, transparent 55%),
              radial-gradient(ellipse at 80% 80%, #8b1a5e 0%, transparent 55%),
              radial-gradient(ellipse at 50% 50%, #2a0840 0%, #160320 100%);
  animation: gradShift 12s ease-in-out infinite alternate;
}
@keyframes gradShift {
  0%   { opacity: 1; filter: hue-rotate(0deg); }
  50%  { opacity: 0.85; filter: hue-rotate(15deg); }
  100% { opacity: 1; filter: hue-rotate(-10deg); }
}

/* Orbs */
.orb {
  position: fixed;
  border-radius: 50%;
  filter: blur(90px);
  pointer-events: none;
  z-index: 0;
  animation: orbDrift ease-in-out infinite alternate;
}
.o1 { width: 480px; height: 480px; background: #4a126066; top: -140px; left: -120px; animation-duration: 13s; }
.o2 { width: 380px; height: 380px; background: #c0507a44; bottom: -100px; right: -80px; animation-duration: 17s; animation-delay: -6s; }
.o3 { width: 280px; height: 280px; background: #7b2d8b33; top: 45%; left: 55%; transform: translate(-50%,-50%); animation-duration: 11s; animation-delay: -3s; }
@keyframes orbDrift {
  from { transform: translate(0,0) scale(1); }
  to   { transform: translate(25px, 35px) scale(1.10); }
}

/* Stars / particles */
.stars {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  overflow: hidden;
}
.star {
  position: absolute;
  border-radius: 50%;
  background: #fff;
  animation: twinkle linear infinite;
}
@keyframes twinkle {
  0%,100% { opacity: 0; transform: scale(0.5); }
  50%     { opacity: 0.7; transform: scale(1); }
}

/* Floating hearts */
.hearts-wrap {
  position: fixed;
  inset: 0;
  z-index: 1;
  pointer-events: none;
  overflow: hidden;
}
.fheart {
  position: absolute;
  bottom: -60px;
  opacity: 0;
  animation: floatUp linear infinite;
  user-select: none;
  font-style: normal;
}
@keyframes floatUp {
  0%   { transform: translateY(0) rotate(-10deg) scale(0.7); opacity: 0; }
  8%   { opacity: 0.65; }
  90%  { opacity: 0.25; }
  100% { transform: translateY(-105vh) rotate(20deg) scale(1.1); opacity: 0; }
}

/* ═══════════════════════════
   LAYOUT
═══════════════════════════ */
#wrapper {
  position: relative;
  z-index: 2;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 32px 16px;
}

/* ═══════════════════════════
   GATE CARD
═══════════════════════════ */
#gate {
  width: 100%;
  max-width: 460px;
  background: linear-gradient(140deg, rgba(255,248,252,0.09), rgba(60,15,80,0.22));
  border: 1px solid rgba(244,167,192,0.20);
  backdrop-filter: blur(22px);
  -webkit-backdrop-filter: blur(22px);
  border-radius: 26px;
  padding: clamp(36px,8vw,60px) clamp(24px,7vw,52px) clamp(40px,9vw,64px);
  text-align: center;
  box-shadow: 0 0 70px rgba(192,80,122,0.14), 0 35px 90px rgba(0,0,0,0.50);
  animation: riseIn 1s cubic-bezier(.22,1,.36,1) both;
}
@keyframes riseIn {
  from { opacity: 0; transform: translateY(28px) scale(0.96); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

.eyebrow {
  font-family: 'Jost', sans-serif;
  font-weight: 200;
  font-size: clamp(0.6rem, 2.5vw, 0.72rem);
  letter-spacing: 0.26em;
  text-transform: uppercase;
  color: var(--blush);
  opacity: 0.78;
  margin-bottom: 14px;
}
.gate-title {
  font-family: 'Great Vibes', cursive;
  font-size: clamp(2rem, 7vw, 3rem);
  color: var(--cream);
  line-height: 1.25;
  text-shadow: 0 0 50px var(--glow-r), 0 2px 14px rgba(0,0,0,.45);
  margin-bottom: 8px;
}
.divider {
  display: flex;
  align-items: center;
  gap: 10px;
  margin: 26px 0 22px;
}
.divider::before, .divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(244,167,192,.35), transparent);
}
.divider span { color: var(--blush); font-size: 0.9rem; opacity: 0.65; }

.field-label {
  display: block;
  font-family: 'Jost', sans-serif;
  font-weight: 300;
  font-size: clamp(0.65rem,2.5vw,0.76rem);
  letter-spacing: 0.17em;
  text-transform: uppercase;
  color: var(--blush);
  text-align: left;
  margin-bottom: 10px;
}

#birthday {
  width: 100%;
  padding: 15px 18px;
  background: rgba(255,248,252,0.07);
  border: 1px solid rgba(244,167,192,0.20);
  border-radius: 14px;
  color: var(--cream);
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(1rem,3vw,1.08rem);
  letter-spacing: 0.04em;
  outline: none;
  transition: border-color .3s, box-shadow .3s, background .3s;
  cursor: pointer;
  margin-bottom: 20px;
}
#birthday::-webkit-calendar-picker-indicator {
  filter: invert(.7) sepia(1) saturate(3) hue-rotate(290deg);
  cursor: pointer;
}
#birthday:focus {
  border-color: rgba(192,80,122,.55);
  box-shadow: 0 0 0 3px rgba(192,80,122,.14);
  background: rgba(255,248,252,.10);
}

/* Submit button */
#submit-btn {
  width: 100%;
  padding: 16px 28px;
  background: linear-gradient(130deg, var(--rose) 0%, var(--violet) 100%);
  border: none;
  border-radius: 14px;
  color: #fff;
  font-family: 'Jost', sans-serif;
  font-weight: 300;
  font-size: clamp(0.72rem,2.5vw,0.82rem);
  letter-spacing: 0.26em;
  text-transform: uppercase;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  transition: transform .22s, box-shadow .3s;
  box-shadow: 0 8px 32px rgba(192,80,122,.42), 0 0 0 1px rgba(255,255,255,.06) inset;
}
#submit-btn::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,.16) 0%, transparent 55%);
  opacity: 0;
  transition: opacity .3s;
  border-radius: inherit;
}
#submit-btn:hover { transform: translateY(-2px); box-shadow: 0 14px 44px rgba(192,80,122,.55); }
#submit-btn:hover::before { opacity: 1; }
#submit-btn:active { transform: translateY(0); }
/* shimmer */
#submit-btn::after {
  content: '';
  position: absolute;
  top: -50%; left: -75%;
  width: 50%; height: 200%;
  background: linear-gradient(105deg, transparent 40%, rgba(255,255,255,.22) 50%, transparent 60%);
  transform: skewX(-20deg);
  animation: shimmer 3.8s ease-in-out infinite;
}
@keyframes shimmer {
  0%,100% { left:-75%; opacity:0; }
  40%      { opacity:1; }
  60%      { left:130%; opacity:0; }
}

/* Error */
#error-msg {
  display: none;
  margin-top: 16px;
  padding: 13px 18px;
  border-radius: 12px;
  background: rgba(192,80,122,.12);
  border: 1px solid rgba(192,80,122,.24);
  color: var(--blush);
  font-style: italic;
  font-size: clamp(0.95rem,3vw,1.05rem);
  animation: slideDown .4s ease both;
}
@keyframes slideDown {
  from { opacity:0; transform:translateY(-8px); }
  to   { opacity:1; transform:translateY(0); }
}

/* ═══════════════════════════
   LETTER PAGE
═══════════════════════════ */
#letter-page {
  display: none;
  width: 100%;
  max-width: 640px;
  animation: riseIn 1.1s cubic-bezier(.22,1,.36,1) both;
}

.letter-card {
  background: linear-gradient(150deg, rgba(255,248,252,0.10) 0%, rgba(60,15,80,0.22) 100%);
  border: 1px solid rgba(244,167,192,0.18);
  backdrop-filter: blur(26px);
  -webkit-backdrop-filter: blur(26px);
  border-radius: 28px;
  padding: clamp(36px,8vw,60px) clamp(22px,7vw,52px) clamp(44px,9vw,68px);
  box-shadow: 0 0 90px rgba(192,80,122,.18), 0 45px 110px rgba(0,0,0,.50);
  position: relative;
  overflow: hidden;
  animation: letterGlow 6s ease-in-out infinite;
}
@keyframes letterGlow {
  0%,100% { box-shadow: 0 0 90px rgba(192,80,122,.18), 0 45px 110px rgba(0,0,0,.50); }
  50%      { box-shadow: 0 0 140px rgba(192,80,122,.30), 0 45px 110px rgba(0,0,0,.50); }
}
.letter-card::before, .letter-card::after {
  content: '✦';
  position: absolute;
  font-size: 1.1rem;
  color: rgba(192,80,122,.35);
  animation: star 3.5s ease-in-out infinite alternate;
}
.letter-card::before { top: 20px; left: 24px; }
.letter-card::after  { bottom: 20px; right: 24px; animation-delay: -1.8s; }
@keyframes star {
  0%   { opacity:.15; transform:scale(.8); }
  100% { opacity:.85; transform:scale(1.25); }
}

.letter-eyebrow {
  font-family: 'Jost', sans-serif;
  font-weight: 200;
  font-size: clamp(0.6rem,2.5vw,0.70rem);
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--blush);
  opacity: .72;
  margin-bottom: 12px;
  text-align: center;
}
.letter-heading {
  font-family: 'Great Vibes', cursive;
  font-size: clamp(2.4rem,7vw,3.8rem);
  color: var(--cream);
  line-height: 1.1;
  text-align: center;
  margin-bottom: 30px;
  text-shadow: 0 0 60px var(--glow-r), 0 2px 16px rgba(0,0,0,.5);
}
.letter-body {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(1rem,2.8vw,1.16rem);
  line-height: 1.95;
  color: rgba(253,232,240,.90);
  font-weight: 300;
  text-align: left;
  min-height: 220px;
}
.letter-body p { margin-bottom: 1.2em; }
.letter-sign {
  margin-top: 32px;
  text-align: right;
  font-family: 'Great Vibes', cursive;
  font-size: clamp(1.7rem,5vw,2.2rem);
  color: var(--blush);
  text-shadow: 0 0 24px var(--glow-r);
  opacity: 0;
  transition: opacity 1.2s ease;
}
.letter-sign.show { opacity: 1; }

/* Cursor */
.cursor {
  display: inline-block;
  width: 2px;
  height: 1.05em;
  background: var(--blush);
  margin-left: 2px;
  vertical-align: middle;
  animation: blink .85s step-end infinite;
}
@keyframes blink {
  0%,100% { opacity:1; }
  50%      { opacity:0; }
}

/* ═══════════════════════════
   MUSIC PLAYER
═══════════════════════════ */
#player {
  display: none;
  margin-top: 22px;
  background: rgba(255,248,252,0.07);
  border: 1px solid rgba(244,167,192,0.18);
  border-radius: 18px;
  padding: 18px 22px;
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  text-align: center;
}
.player-title {
  font-family: 'Jost', sans-serif;
  font-weight: 200;
  font-size: 0.68rem;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--blush);
  opacity: .7;
  margin-bottom: 14px;
}
.player-controls {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 18px;
}
#play-btn {
  width: 52px;
  height: 52px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--rose), var(--violet));
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.3rem;
  color: #fff;
  box-shadow: 0 6px 24px rgba(192,80,122,.45);
  transition: transform .22s, box-shadow .3s;
  flex-shrink: 0;
}
#play-btn:hover { transform: scale(1.08); box-shadow: 0 10px 32px rgba(192,80,122,.60); }
#play-btn:active { transform: scale(0.96); }

/* Equalizer bars (playing animation) */
.eq {
  display: flex;
  align-items: flex-end;
  gap: 4px;
  height: 28px;
}
.eq-bar {
  width: 4px;
  border-radius: 3px;
  background: linear-gradient(to top, var(--rose), var(--blush));
  animation: eqAnim ease-in-out infinite alternate;
  transform-origin: bottom;
}
.eq-bar:nth-child(1) { animation-duration: .6s; animation-delay: 0s; }
.eq-bar:nth-child(2) { animation-duration: .45s; animation-delay: .1s; }
.eq-bar:nth-child(3) { animation-duration: .7s; animation-delay: .05s; }
.eq-bar:nth-child(4) { animation-duration: .5s; animation-delay: .15s; }
.eq-bar:nth-child(5) { animation-duration: .65s; animation-delay: .08s; }
@keyframes eqAnim {
  from { height: 4px; opacity:.4; }
  to   { height: 24px; opacity:1; }
}
.eq.paused .eq-bar { animation-play-state: paused; height: 8px; opacity:.4; }

.song-info {
  text-align: left;
}
.song-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1rem;
  color: var(--cream);
  font-style: italic;
  margin-bottom: 3px;
}
.song-sub {
  font-family: 'Jost', sans-serif;
  font-weight: 200;
  font-size: 0.68rem;
  letter-spacing: .1em;
  color: var(--blush);
  opacity: .65;
}

/* Autoplay notice */
#autoplay-notice {
  display: none;
  margin-top: 12px;
  font-family: 'Jost', sans-serif;
  font-weight: 300;
  font-size: 0.72rem;
  letter-spacing: 0.08em;
  color: var(--blush);
  opacity: .7;
  font-style: italic;
}

/* ── Responsive ── */
@media (max-width: 480px) {
  .player-controls { gap: 12px; }
  #play-btn { width: 44px; height: 44px; font-size: 1.1rem; }
}
</style>
</head>
<body>

<div class="bg-gradient"></div>
<div class="orb o1"></div>
<div class="orb o2"></div>
<div class="orb o3"></div>
<div class="stars" id="stars"></div>
<div class="hearts-wrap" id="hearts"></div>

<audio id="bg-audio" loop>
  <source src="song.mp3" type="audio/mpeg">
</audio>

<div id="wrapper">

  <!-- ── GATE SCREEN ── -->
  <div id="gate">
    <p class="eyebrow">A secret message awaits</p>
    <h1 class="gate-title">To see the message,<br>confirm you're the one.</h1>

    <div class="divider"><span>❧</span></div>

    <label class="field-label" for="birthday">What is my birthday (month–year)?</label>
    <input type="date" id="birthday" />
    <button id="submit-btn" onclick="checkDate()">Unlock the Letter</button>
    <div id="error-msg">Hmm… that doesn't feel right ❤️<br>
      <small style="font-size:.85rem;opacity:.75">Only the right person knows this…</small>
    </div>
  </div>

  <!-- ── LETTER PAGE ── -->
  <div id="letter-page">
    <div class="letter-card">
      <p class="letter-eyebrow">Written only for you</p>
      <h2 class="letter-heading">My Dearest Love</h2>
      <div class="letter-body" id="letter-body"></div>
      <div class="letter-sign" id="letter-sign">Forever yours, shadelo ♡</div>
    </div>

    <!-- Music player -->
    <div id="player">
      <p class="player-title">♪ &nbsp;playing for you &nbsp;♪</p>
      <div class="player-controls">
        <button id="play-btn" onclick="togglePlay()" title="Play / Pause">▶</button>
        <div class="eq" id="eq">
          <div class="eq-bar"></div>
          <div class="eq-bar"></div>
          <div class="eq-bar"></div>
          <div class="eq-bar"></div>
          <div class="eq-bar"></div>
        </div>
        <div class="song-info">
          <div class="song-name">My Fav Song</div>
          <div class="song-sub">A song from the heart</div>
        </div>
      </div>
      <p id="autoplay-notice">↑ Tap play to start the music ♡</p>
    </div>
  </div>

</div><!-- /wrapper -->

<script>
// ═══════════════════════════════════
//  STARS
// ═══════════════════════════════════
(function spawnStars() {
  const c = document.getElementById('stars');
  for (let i = 0; i < 70; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const sz = Math.random() * 2.2 + 0.6;
    s.style.cssText = `
      width:${sz}px; height:${sz}px;
      left:${Math.random()*100}%;
      top:${Math.random()*100}%;
      animation-duration:${2+Math.random()*4}s;
      animation-delay:${Math.random()*6}s;
    `;
    c.appendChild(s);
  }
})();

// ═══════════════════════════════════
//  HEARTS
// ═══════════════════════════════════
const heartSymbols = ['♥','❤','💕','💗','💖','❣','💓'];
function spawnHeart() {
  const h = document.createElement('span');
  h.className = 'fheart';
  h.textContent = heartSymbols[Math.floor(Math.random() * heartSymbols.length)];
  const sz = 0.75 + Math.random() * 1.5;
  h.style.cssText = `
    left:${Math.random()*100}%;
    font-size:${sz}rem;
    animation-duration:${8+Math.random()*10}s;
    animation-delay:${Math.random()*5}s;
    color:hsl(${310+Math.random()*45}deg,80%,${68+Math.random()*18}%);
  `;
  document.getElementById('hearts').appendChild(h);
  h.addEventListener('animationend', () => h.remove());
}
setInterval(spawnHeart, 700);
for (let i = 0; i < 10; i++) spawnHeart();

// ═══════════════════════════════════
//  DATE CHECK
// ═══════════════════════════════════
function checkDate() {
  const val  = document.getElementById('birthday').value;
  const err  = document.getElementById('error-msg');
  const inp  = document.getElementById('birthday');

  if (!val) {
    err.style.display = 'block';
    err.innerHTML = 'Please pick a date first, my love… 🌸';
    return;
  }

  if (val === '2002-11-06') {
    // ── Start audio RIGHT HERE inside the click handler ──
    // This is a trusted user-gesture context, so browsers allow it on all platforms.
    audio.volume = 0;
    audio.play().then(() => {
      // Fade volume in smoothly over ~3 seconds
      let v = 0;
      const fade = setInterval(() => {
        v = Math.min(v + 0.03, 0.65);
        audio.volume = v;
        if (v >= 0.65) clearInterval(fade);
      }, 140);
      // Mark as playing so the UI reflects correctly when the letter page shows
      _playingFromClick = true;
    }).catch(() => {
      // Should almost never happen since we're inside a click, but handle gracefully
      _playingFromClick = false;
    });

    // Smooth fade out gate
    const gate = document.getElementById('gate');
    gate.style.transition = 'opacity .6s ease, transform .6s ease';
    gate.style.opacity = '0';
    gate.style.transform = 'scale(0.95)';
    setTimeout(() => {
      gate.style.display = 'none';
      document.getElementById('letter-page').style.display = 'block';
      document.getElementById('player').style.display = 'block';
      startTypewriter();
      syncPlayerUI();
    }, 620);
  } else {
    err.style.display = 'none';
    void err.offsetWidth; // reflow to restart animation
    err.style.display = 'block';
    err.innerHTML = 'Hmm… that doesn\'t feel right ❤️<br><small style="font-size:.85rem;opacity:.75">Only the right person knows this…</small>';
    inp.style.borderColor = 'rgba(192,80,122,.6)';
    setTimeout(() => { inp.style.borderColor = ''; }, 1800);
  }
}

document.getElementById('birthday').addEventListener('keydown', e => {
  if (e.key === 'Enter') checkDate();
});

// ═══════════════════════════════════
//  TYPEWRITER
// ═══════════════════════════════════
const letterParagraphs = [
    "હે બબુડી",

"મારે તને દિલથી એક વાત કહેવી છે. મને ખબર છે કે મારી કેટલીક આદતોને કારણે તું પરેશાન થઈ જાય છે. ક્યારેક હું તને ઇરિટેટ કરું છું, તું જે કહે છે એ હું ભૂલી જાઉં છું, અને મારા તરફથી તને પૂરતા efforts દેખાતા નથી—આ બધું હું સમજું છું અને હું એ સુધારવા સાચે પ્રયત્ન કરી રહ્યો છું.",

function startTypewriter() {
  const container = document.getElementById('letter-body');
  container.innerHTML = '';

  // Create paragraph elements
  const pEls = letterParagraphs.map(() => {
    const p = document.createElement('p');
    container.appendChild(p);
    return p;
  });

  // Cursor
  const cursor = document.createElement('span');
  cursor.className = 'cursor';
  container.appendChild(cursor);

  let pIdx = 0, cIdx = 0;
  const SPEED = 20;

  function type() {
    if (pIdx >= pEls.length) {
      cursor.remove();
      document.getElementById('letter-sign').classList.add('show');
      return;
    }
    const cur = pEls[pIdx];
    const txt = letterParagraphs[pIdx];
    if (cIdx < txt.length) {
      cur.textContent += txt[cIdx++];
      // Move cursor after current paragraph
      if (cur.nextSibling !== cursor) container.insertBefore(cursor, cur.nextSibling);
    } else {
      pIdx++; cIdx = 0;
    }
    setTimeout(type, SPEED);
  }
  setTimeout(type, 500);
}

// ═══════════════════════════════════
//  MUSIC PLAYER
// ═══════════════════════════════════
const audio   = document.getElementById('bg-audio');
const playBtn = document.getElementById('play-btn');
const eq      = document.getElementById('eq');
const notice  = document.getElementById('autoplay-notice');

// Flag set inside the submit click handler (trusted gesture context)
let _playingFromClick = false;

function setPlayState(isPlaying) {
  if (isPlaying) {
    playBtn.textContent = '⏸';
    eq.classList.remove('paused');
    notice.style.display = 'none';
  } else {
    playBtn.textContent = '▶';
    eq.classList.add('paused');
  }
}

// Called after the letter page is revealed — syncs UI to actual audio state
function syncPlayerUI() {
  if (_playingFromClick && !audio.paused) {
    setPlayState(true);
  } else {
    setPlayState(false);
    notice.style.display = 'block';
  }
}

function togglePlay() {
  if (!audio.paused) {
    audio.pause();
    setPlayState(false);
  } else {
    audio.play()
      .then(() => setPlayState(true))
      .catch(() => { notice.style.display = 'block'; });
  }
}

audio.addEventListener('pause', () => setPlayState(false));
audio.addEventListener('play',  () => setPlayState(true));
</script>
